<ion-view title="Thema's">

	<div class="advert">
		<img src="img/logo.svg" alt="Iedereen West-Vlaams" />
	</div>

	<ion-content class="has-header has-footer has-advert">
	    <ul class="list">
		    <li class="item item-icon-right" ng-repeat="theme in themes" ui-sref="app.tab.themes.theme({theme: {{::$index}}})">
		       {{::theme.categoryTitle}} <i class="icon icon-arrow-right"></i>
		    </li>
		</ul>
	</ion-content>
</ion-view>
